<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Overlapping Shapes</title>
    <style>
        /* 1. 建立一個相對定位的容器，讓裡面的圖形可以以此為基準自由移動疊加 */
        .container {
            position: relative;
            width: 300px;
            height: 200px;
            margin: 20px;
        }

        /* 2. 矩形的樣式：藍色背景、黑色粗邊框 */
        .rectangle {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 120px;
            height: 120px;
            background-color: blue;
            border: 4px solid black;
        }

        /* 3. 圓形的樣式：黃色背景、紅色粗邊框 */
        .circle {
            position: absolute;
            top: 35px;      /* 調整上下位置 */
            left: 100px;    /* 調整左右位置，使其與矩形重疊 */
            width: 100px;
            height: 100px;
            background-color: yellow;
            border: 4px solid red;
            border-radius: 50%; /* 將正方形變成圓形的關鍵 */
            z-index: 10;        /* 數字越大，圖形越在上層 */
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="rectangle"></div>
        <div class="circle"></div>
    </div>

</body>
</html>
